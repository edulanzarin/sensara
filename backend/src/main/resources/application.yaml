spring:
  application:
    name: sensara-api
  datasource:
    url: jdbc:postgresql://localhost:5432/sensara
    username: postgres
    password: masterkey
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

storage:
  upload-dir: uploads
